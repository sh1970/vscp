name: Build and deploy on macOS

on:
  push:
    branches: [ master, main, development ]
  pull_request:
    branches: [ master, main, development ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install dependencies via Homebrew
      run: |
        brew update
        brew install openssl@3 mosquitto expat curl

    - name: Configure CMake
      run: |
        MOSQUITTO_PREFIX=$(brew --prefix mosquitto)
        OPENSSL_PREFIX=$(brew --prefix openssl@3)
        EXPAT_PREFIX=$(brew --prefix expat)
        cmake -B ${{github.workspace}}/build \
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DOPENSSL_ROOT_DIR=${OPENSSL_PREFIX} \
          -DMOSQUITTO_INCLUDE_DIR=${MOSQUITTO_PREFIX}/include \
          -DMOSQUITTO_LIBRARY=${MOSQUITTO_PREFIX}/lib/libmosquitto.dylib \
          -DEXPAT_INCLUDE_DIR=${EXPAT_PREFIX}/include \
          -DEXPAT_LIBRARY=${EXPAT_PREFIX}/lib/libexpat.dylib

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -j$(sysctl -n hw.ncpu)

    - name: Create package
      working-directory: ${{github.workspace}}/build
      run: cpack -G ZIP -C ${{env.BUILD_TYPE}}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: vscpd-macos-x64
        path: ${{github.workspace}}/build/*.zip
        retention-days: 7
