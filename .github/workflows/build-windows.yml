name: Build and deploy on Windows

on:
  push:
    branches: [ master, main, development ]
  pull_request:
    branches: [ master, main, development ]

env:
  BUILD_TYPE: Release
  VCPKG_DEFAULT_TRIPLET: x64-windows

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: '01f602195983451bc83e72f4214af2cbc495aa94'
        vcpkgDirectory: '${{ github.workspace }}/vcpkg'

    - name: Install dependencies via vcpkg
      run: |
        vcpkg install openssl:x64-windows
        vcpkg install pthreads:x64-windows
        vcpkg install mosquitto:x64-windows
        vcpkg install expat:x64-windows
        vcpkg install dlfcn-win32:x64-windows

    - name: Configure CMake
      run: |
        cmake -B ${{github.workspace}}/build -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} `
          -DVCPKG_TARGET_TRIPLET=x64-windows `
          -DCMAKE_TOOLCHAIN_FILE=${{env.VCPKG_ROOT}}/scripts/buildsystems/vcpkg.cmake

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Create package
      working-directory: ${{github.workspace}}/build
      run: cpack -G ZIP -C ${{env.BUILD_TYPE}}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: vscpd-windows-x64
        path: ${{github.workspace}}/build/*.zip
        retention-days: 7
