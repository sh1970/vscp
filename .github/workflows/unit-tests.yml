name: Unit Tests

on:
  push:
    branches: [ master, main, development ]
  pull_request:
    branches: [ master, main, development ]

env:
  BUILD_TYPE: Debug

jobs:
  test-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
     
    - name: Update package lists
      run: sudo apt-get update

    - name: Install Google Test
      run: |
        sudo apt-get install -y libgtest-dev
        cd /usr/src/googletest
        sudo cmake -S . -B build -DBUILD_GMOCK=OFF
        sudo cmake --build build
        sudo cmake --install build

    - name: Install dependencies
      run: |
        sudo apt-get install -y \
          libssl-dev \
          libexpat-dev \
          libcurl4-openssl-dev

    - name: Create test build directory
      run: cmake -E make_directory ${{github.workspace}}/tests/build

    - name: Configure unit tests
      working-directory: ${{github.workspace}}/tests/build
      run: cmake .. -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build unit tests
      working-directory: ${{github.workspace}}/tests/build
      run: make -j$(nproc)

    - name: Run unit tests
      working-directory: ${{github.workspace}}/tests/build
      run: |
        echo "Running GUID tests..."
        ./guid/unittest_guid
        echo "Running DateTime tests..."
        ./vscpdatetime/unittest_datetime
        echo "Running VscpHelper tests..."
        ./vscphelper/unittest_vscphelper

  test-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install dependencies via Homebrew
      run: |
        brew update
        brew install googletest openssl@3 expat

    - name: Create test build directory
      run: cmake -E make_directory ${{github.workspace}}/tests/build

    - name: Configure unit tests
      working-directory: ${{github.workspace}}/tests/build
      run: |
        OPENSSL_PREFIX=$(brew --prefix openssl@3)
        EXPAT_PREFIX=$(brew --prefix expat)
        GTEST_PREFIX=$(brew --prefix googletest)
        cmake .. -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DOPENSSL_ROOT_DIR=${OPENSSL_PREFIX} \
          -DCMAKE_PREFIX_PATH="${OPENSSL_PREFIX};${EXPAT_PREFIX};${GTEST_PREFIX}" \
          -DCMAKE_CXX_FLAGS="-I${GTEST_PREFIX}/include" \
          -DCMAKE_LIBRARY_PATH="${GTEST_PREFIX}/lib"

    - name: Build unit tests
      working-directory: ${{github.workspace}}/tests/build
      run: make -j$(sysctl -n hw.ncpu)

    - name: Run unit tests
      working-directory: ${{github.workspace}}/tests/build
      run: |
        echo "Running GUID tests..."
        ./guid/unittest_guid
        echo "Running DateTime tests..."
        ./vscpdatetime/unittest_datetime
        echo "Running VscpHelper tests..."
        ./vscphelper/unittest_vscphelper
